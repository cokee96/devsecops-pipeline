apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
  annotations:
    policies.kyverno.io/title: Verify Cosign Image Signatures
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Rejects any Pod that runs an image from ghcr.io/cokee96 that has not been
      signed by the DevSecOps pipeline using Cosign keyless signing via Sigstore.
      Prevents deploying images that bypassed the security pipeline.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: check-image-signature
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces:
                - demo
                - default
      verifyImages:
        - imageReferences:
            - "ghcr.io/cokee96/devsecops-demo*"
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/cokee96/devsecops-pipeline/.github/workflows/pipeline.yaml@refs/heads/main"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
